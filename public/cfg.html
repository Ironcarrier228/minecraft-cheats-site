<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteCheats - Config</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/cfg">Config</a>
        <a href="/viruses">Viruses</a>
    </div>

    <div class="container">
        <h1>Configurations</h1>
        <div class="config-section">
            <h2>Folders</h2>
            <div class="folder">
                <i class="fas fa-folder"></i>
                <a href="#">venus free</a>
                <i class="fas fa-plus toggle" onclick="toggleFiles(this)"></i>
            </div>
            <div class="files">
                <a href="/cfg/venus free/venus_free.cfg">venus_free.cfg</a>
                <a href="/cfg/venus free/venus_extra.cfg">venus_extra.cfg</a>
            </div>
            <div class="folder">
                <i class="fas fa-cog"></i>
                <a href="#">Settings</a>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 EliteCheats - Minecraft Hacks</p>
    </footer>

    <script>
        function toggleFiles(element) {
            const files = element.parentElement.nextElementSibling;
            if (files.style.display === "block") {
                files.style.display = "none";
                element.classList.remove("fa-minus");
                element.classList.add("fa-plus");
            } else {
                files.style.display = "block";
                element.classList.remove("fa-plus");
                element.classList.add("fa-minus");
            }
        }
    </script>
</body>
</html>
